services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./trial-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/todos
    depends_on:
      - mongodb

  frontend:
    build: ./trial-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data: {}